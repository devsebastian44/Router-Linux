stages:
  - lint
  - security
  - test

lint-scripts:
  stage: lint
  image: alpine:latest
  script:
    - apk add --no-cache bash
    - bash -n src/setup.sh
    - bash -n tests/syntax_check.sh

security-scan:
  stage: security
  image: alpine:latest
  script:
    - echo "Running security scan on configurations..."
    # Simple search for potential secrets/sensitive info
    - grep -rv "password" configs/ || true

test-logic:
  stage: test
  image: alpine:latest
  script:
    - apk add --no-cache bash
    - bash tests/syntax_check.sh
